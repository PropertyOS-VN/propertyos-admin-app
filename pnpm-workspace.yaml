allowBuilds:
  # HeroUI utility noi bo - da chu dong dung HeroUI nen tin tuong duoc.
  '@heroui/shared-utils': true
  # Next.js dung sharp de optimize anh (next/image) - can build native binary.
  sharp: true
  # Dung boi eslint-import-resolver-typescript de resolve path nhanh hon.
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@supabase/auth-js@2.110.2'
  - '@supabase/functions-js@2.110.2'
  - '@supabase/postgrest-js@2.110.2'
  - '@supabase/realtime-js@2.110.2'
  - '@supabase/storage-js@2.110.2'
  - '@supabase/supabase-js@2.110.2'
